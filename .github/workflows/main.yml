name: FastAPI CI/CD
on:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4.2.2
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13' 
      - run: pip install -r requirements.txt
      - run: pytest test_main.py
  lint:
     runs-on: ubuntu-latest
     steps:
       - name: checkout code
         uses: actions/checkout@v5
       - name: Setup Python
         uses: actions/setup-python@v6
         with:
           python-version: '3.13'
           cache: "pip"
       - name: Install lint tools
         run: pip install ruff black
       - name: Run ruff
         run: ruff check .
       - name: Fix
         run: black .
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v5
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker build and Push
        uses: docker/build-push-action@v5
        with:
          context:
          push: true
          tags: ghcr.io/freny11/project1:latest
  
           
      
      

       
